# Easier prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix
bind , command-prompt -I "" -p "Rename window:" "rename-window '%%'"

# Start windows/panes at 1 (more natural for many users)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Split panes in current path
bind | split-window -h -c "#{pane_current_path}"
bind \ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"' # default split
unbind % # default split
bind c new-window -c "#{pane_current_path}"

# Optional quick split without prefix (may depend on terminal Alt handling)
bind -n M-s split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Better UX
set -g mouse on
set -g history-limit 50000

# Restore old mouse-select behavior: drag to select and release to copy into tmux buffer.
unbind -T root MouseDragEnd1Pane
bind -T root MouseDragEnd1Pane if-shell -F "#{pane_in_mode}" "send-keys -X copy-selection-and-cancel" "send-keys -M"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Use login shell in panes so PATH/profile-based tools are available.
set -g default-shell /bin/bash
set -g default-command "/bin/bash -l"
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY PATH"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# I think this improves sizing for dual monitor etc setups
setw -g aggressive-resize on

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'

# Session persistence
# Requires TPM: https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Keep TPM initialization at the bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
